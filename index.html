<!doctype html>
<html lang="sr-ME">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Soffritto online meni – mobile-first, potpuno responzivan prikaz menija."
        />
        <title>Soffritto | Online meni</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="bg-pattern" aria-hidden="true"></div>

        <header class="hero" id="top">
            <div class="hero__topline">
                <span class="hero__lang">Crnogorski</span>
            </div>
            <div class="hero__inner shell">
                <div class="hero__brand" aria-label="Soffritto logo">
                    <img
                        src="assets/logo_chef_bijeli.png"
                        alt="Soffritto logo"
                        class="hero__chef"
                    />
                    <img
                        src="assets/soffritto_natpis_bijeli.png"
                        alt="Soffritto"
                        class="hero__text"
                    />
                </div>

                <div class="hero__copy">
                    <h1>Svježa pasta, sendviči, specijaliteti i kafa.</h1>
                    <p class="hero__lead">Doživite pravi italijanski ukus</p>
                </div>
                <div class="hero__slider" id="menuSlider">
                    <div class="hero__slider-track">
                        <div class="hero__slider-handle" id="sliderHandle">
                            →
                        </div>
                        <span class="hero__slider-text">Prevuci za meni</span>
                    </div>
                </div>
                <!--
                <a href="#menuPanel" class="hero__cta">
                    <span class="hero__cta-icon">→</span>
                    <span>Prevuci za meni</span>
                </a>-->
            </div>
        </header>
        <script src="script.js"></script>
    </body>
</html>
